version: '3.8'

services:
  # ── Redis (Message Broker & Cache) ──
  redis:
    image: redis:alpine
    container_name: contract_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ── Qdrant (Vector Database) ──
  qdrant:
    image: qdrant/qdrant:latest
    container_name: contract_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  # ── FastAPI Web Application ──
  web:
    build: .
    container_name: contract_api_server
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL:?REDIS_URL is required}
      - QDRANT_URL=${QDRANT_URL:?QDRANT_URL is required}
      - OLLAMA_URL=${OLLAMA_URL:?OLLAMA_URL is required}
      - EMBEDDING_DEVICE=${EMBEDDING_DEVICE:?EMBEDDING_DEVICE is required}
      - OCR_USE_GPU=${OCR_USE_GPU:?OCR_USE_GPU is required}
    volumes:
      - ./data/uploads:/app/data/uploads
    depends_on:
      - redis
      - qdrant
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── Celery Background Task Worker ──
  celery_worker:
    build: .
    container_name: contract_celery_worker
    command: celery -A core.celery_app worker --loglevel=info --pool=solo
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL}
      - QDRANT_URL=${QDRANT_URL}
      - OLLAMA_URL=${OLLAMA_URL}
      - EMBEDDING_DEVICE=${EMBEDDING_DEVICE}
      - OCR_USE_GPU=${OCR_USE_GPU}
    volumes:
      - ./data/uploads:/app/data/uploads
    depends_on:
      - redis
      - qdrant
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  qdrant_storage:
